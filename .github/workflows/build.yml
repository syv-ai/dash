name: Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'test/code-signing'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild native modules for Electron
        run: pnpm exec electron-rebuild -f -w node-pty,better-sqlite3

      - name: Build
        run: pnpm build

      - name: Package, sign, and notarize
        timeout-minutes: 15
        run: pnpm exec electron-builder --mac --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: 2DD8ZKZ975

      - name: Verify code signature
        run: |
          APP_PATH="release/mac-arm64/Dash.app"
          echo "==> Verifying code signature..."
          codesign --verify --verbose=2 "$APP_PATH"
          echo "==> Checking notarization..."
          spctl --assess --verbose=2 "$APP_PATH"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Dash-mac-arm64
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  release:
    needs: build-mac
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
